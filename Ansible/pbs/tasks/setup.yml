    - pbs_package_source|lower == 'custom'
  tags: ["pbs"]

- name: "Install pbs server packages block"
  become: yes
  block:
    - debug:
        msg: "Installing pbs server packages, this may take a while..."
      tags: ["pbs"]

    - name: "Install pbs server packages"
      apt: 
        name: "{{ item }}"
        state: latest
        update_cache: yes
      loop: 
        - "{{ pbs_apt_packages_server }}"
  when: 
    - pbs_install_packages|bool
    - pbs_install_type|lower is search('(server)')
  tags: ["pbs"]

- name: "Install pbs client packages block"
  become: yes
  block:
    - debug:
        msg: "Installing pbs client packages, this may take a while..."
      tags: ["pbs"]

    - name: "Install pbs client packages"
      apt: 
        name: "{{ item }}"
        state: latest
        update_cache: yes
      loop: 
        - "{{ pbs_apt_packages_client }}"
  when: 
    - pbs_install_packages|bool
    - pbs_install_type|lower is search('(client)')
  tags: ["pbs"]
