---
# ============================================================================
# pmg_domain_mgmt - main entry
# ============================================================================
# Order:
#   00 packages   curl + jq on the host that will run the script
#   10 api_user   OPT-IN: bootstrap the API user on a PMG node via pmgsh
#   20 deploy     credentials file (0600) + the management script (0755)
#   30 selftest   OPT-IN: read-only connectivity check of the deployed script
#
# Every task is tagged `pmg_domain_mgmt` plus a phase tag, so you can run a
# slice, e.g.:  ansible-playbook ... --tags pmg_domain_mgmt_deploy
# ============================================================================

- name: pmg_domain_mgmt | Install required packages (curl, jq)
  ansible.builtin.import_tasks: 00_packages.yml
  tags:
    - pmg_domain_mgmt
    - pmg_domain_mgmt_packages

- name: pmg_domain_mgmt | Bootstrap the API user on the PMG (opt-in)
  ansible.builtin.import_tasks: 10_api_user.yml
  when: pmg_domain_mgmt_create_user | bool
  tags:
    - pmg_domain_mgmt
    - pmg_domain_mgmt_user

- name: pmg_domain_mgmt | Deploy credentials file and management script
  ansible.builtin.import_tasks: 20_deploy.yml
  tags:
    - pmg_domain_mgmt
    - pmg_domain_mgmt_deploy

- name: pmg_domain_mgmt | Read-only self-test of the deployed script (opt-in)
  ansible.builtin.import_tasks: 30_selftest.yml
  when: pmg_domain_mgmt_selftest | bool
  tags:
    - pmg_domain_mgmt
    - pmg_domain_mgmt_selftest
