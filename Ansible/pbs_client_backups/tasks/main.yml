---
# Orchestrator for the pbs_client_backups role.
#
# Task names intentionally carry NO role-name prefix; the role name is applied
# as a tag here at the import_tasks level. Static imports propagate their tags
# to every imported task, so `--tags pbs_client_backups` selects the whole role
# while the finer phase tags select a single phase.

- name: "validate backup target definitions"
  ansible.builtin.import_tasks: validate.yml
  tags: ["pbs_client_backups", "pbs_client_backups_validate"]

- name: "deploy backup scripts and encryption keys"
  ansible.builtin.import_tasks: deploy.yml
  tags: ["pbs_client_backups", "pbs_client_backups_deploy"]

- name: "run post-deploy connectivity test"
  ansible.builtin.import_tasks: test.yml
  when: pbs_client_backups_test_script | bool
  tags: ["pbs_client_backups", "pbs_client_backups_test"]

- name: "deploy backup cron jobs"
  ansible.builtin.import_tasks: cron.yml
  tags: ["pbs_client_backups", "pbs_client_backups_cron"]

- name: "prune artifacts of removed targets"
  ansible.builtin.import_tasks: prune.yml
  when:
    - pbs_client_backups_prune | bool
    - pbs_client_backups | length > 0
  tags: ["pbs_client_backups", "pbs_client_backups_prune"]
