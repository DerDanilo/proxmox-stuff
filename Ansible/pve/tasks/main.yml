---
- name: Fail when invalid debian release was defined
  fail:
    msg: "Error! - Please specify a valid pve_debian_release_name; System is running: {{ ansible_distribution_release }} !"
  when: ansible_distribution_release != pve_debian_release_name
  tags: ["pve"]

- name: "Install pve role dependencies"
  become: yes
  apt: 
    name: 
      - "apt-transport-https"
    state: latest
    update_cache: yes
  tags: ["pve"]

# Run pve package configuration and setup
- import_tasks: setup.yml

# Run pve ceph package configuration and setup
- import_tasks: setup_ceph.yml
  when: pve_install_pve_ceph_repo | bool

