- name: Gather facts again with setup module to get latest information
  setup:
  tags: ["pve"]

- name: Check if PVE kernel is active
  fail:
    msg: >
      Wrong kernel active
      [ {{ ansible_kernel }} does not contain "pve" ]
      A system reboot might be required to activate the pve kernel.
  when:
      - pve_install_packages|bool
      - '"pve" not in ansible_kernel'
  tags: ["pve"]

- name: Check if PVE kernel is active
  debug:
    msg: >
      PVE kernel active
      [ {{ ansible_kernel }} contains "pve" ]
      Installing 'ifupdown2'
  when:
      - pve_install_packages|bool
      - '"pve" in ansible_kernel'
  tags: ["pve"]

- name: "Install ifupdown2 packages"
  become: true
  package:
    name:
      - "zfsutils-linux"
      - "ifupdown2"
    update_cache: yes
    state: latest
  when:
    - pve_install_packages|bool
    - '"pve" in ansible_kernel'
  tags: ["pve"]

- name: "Configure pve sysctl config"
  become: true
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: "present"
    reload: True
  with_dict: "{{ pve_sysctl }}"
  when:
    - pve_configure_sysctl|bool
  tags: ["pve"]

- name: "Configue ZFS options"
  become: true
  block:
    - name: "Create directory '/etc/modprobe.d/'"
      become: true
      file:
        path: "/etc/modprobe.d/"
        state: directory
        owner: root
        group: root
        mode: 0755

    - name: Write zfs options
      become: true
      template:
        src: "{{ role_path }}/templates/etc/modprobe.d/zfs.conf.j2"
        dest: "/etc/modprobe.d/zfs.conf"
        owner: root
        group: root
        mode: 0644
  when:
    - pve_configure_zfs|bool
  tags: ["pve"]
